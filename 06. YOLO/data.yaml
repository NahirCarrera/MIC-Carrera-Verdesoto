# ==========================================
#  data.yaml - Configuración del Dataset YOLO
# ==========================================
# Este archivo le dice a YOLO dónde están las imágenes y qué clases detectar.
# Las rutas son relativas a este archivo.

# Rutas al dataset (generadas por prepare_dataset.py)
train: dataset/train/images
val: dataset/val/images

# Número de clases
nc: 9

# Nombres de clases (DEBE coincidir con CLASS_MAP de labelling.py y screenshoot.py)
names:
  0: tomato
  1: lettuce
  2: onion
  3: pickles
  4: pepper
  5: bacon
  6: ketchup
  7: mayo
  8: jalapeno
